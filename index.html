<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода на карте</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0f202f;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .weather-panel {
            background: rgba(15, 32, 47, 0.8);
            border-radius: 20px;
            padding: 25px;
            color: #fff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .search-box button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #f5c542;
            color: #1e2f3b;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        .search-box button:hover {
            background: #ffd966;
            transform: scale(1.02);
        }
        .city-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        .temp {
            font-size: 52px;
            font-weight: 300;
        }
        .temp-unit {
            font-size: 24px;
            opacity: 0.7;
        }
        .weather-icon {
            font-size: 48px;
        }
        .description {
            font-size: 18px;
            padding-left: 12px;
            border-left: 3px solid #f5c542;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            padding: 16px 20px;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .detail-value {
            font-size: 20px;
            font-weight: 500;
            margin-top: 2px;
        }
        .detail-value small {
            font-size: 13px;
            opacity: 0.6;
            margin-left: 3px;
        }
        .error {
            background: rgba(220, 50, 50, 0.2);
            padding: 10px 16px;
            border-radius: 30px;
            margin-top: 12px;
            border-left: 3px solid #ff7a7a;
            display: none;
            font-size: 14px;
        }
        .error.show {
            display: block;
        }
        .hint {
            text-align: center;
            opacity: 0.3;
            font-size: 12px;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
        .map-wrap {
            border-radius: 20px;
            overflow: hidden;
            background: #1a2f3f;
            min-height: 500px;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
            min-height: 500px;
            background: #1a2f3f;
            cursor: pointer;
        }
        .leaflet-attribution-flag {
            display: none !important;
        }
        .leaflet-control-attribution {
            font-size: 11px;
            background: rgba(0,0,0,0.4);
            color: #aaa;
            padding: 2px 8px !important;
        }
        .leaflet-control-attribution a {
            color: #8ab4d6 !important;
        }
        @media (max-width: 800px) {
            .container {
                grid-template-columns: 1fr;
            }
            .map-wrap {
                min-height: 350px;
            }
            #map {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="weather-panel">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Введите город" value="Москва">
            <button id="searchBtn">Найти</button>
        </div>
        <div class="city-name" id="cityName">Москва</div>
        <div class="weather-main">
            <div>
                <span class="temp" id="temperature">--</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="weather-icon" id="weatherIcon">🌍</div>
        </div>
        <div class="description" id="description">—</div>
        <div class="details">
            <div class="detail-item">
                <span class="detail-label">💧 Влажность</span>
                <span class="detail-value" id="humidity">-- <small>%</small></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">💨 Ветер</span>
                <span class="detail-value" id="windSpeed">-- <small>м/с</small></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">🌡️ Ощущается</span>
                <span class="detail-value" id="feelsLike">-- <small>°C</small></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">📊 Давление</span>
                <span class="detail-value" id="pressure">-- <small>гПа</small></span>
            </div>
        </div>
        <div class="error" id="errorMsg">⚠️ Город не найден</div>
        <div class="hint">📍 Кликните по карте для погоды в точке</div>
    </div>
    <div class="map-wrap">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    (function() {
        // Элементы
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const cityName = document.getElementById('cityName');
        const temperature = document.getElementById('temperature');
        const weatherIcon = document.getElementById('weatherIcon');
        const description = document.getElementById('description');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const feelsLike = document.getElementById('feelsLike');
        const pressure = document.getElementById('pressure');
        const errorMsg = document.getElementById('errorMsg');

        const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

        // Карта
        const map = L.map('map', {
            center: [55.7558, 37.6173],
            zoom: 10
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let marker = L.marker([55.7558, 37.6173]).addTo(map);

        // Функции
        function translateDesc(desc) {
            const dict = {
                'clear sky': 'ясно',
                'few clouds': 'малооблачно',
                'scattered clouds': 'переменная облачность',
                'broken clouds': 'облачно',
                'overcast clouds': 'пасмурно',
                'shower rain': 'ливень',
                'rain': 'дождь',
                'thunderstorm': 'гроза',
                'snow': 'снег',
                'mist': 'туман',
                'smoke': 'дымка',
                'haze': 'мгла',
                'dust': 'пыль',
                'fog': 'туман',
                'sand': 'песчаная буря',
                'ash': 'пепел',
                'squall': 'шквал',
                'tornado': 'торнадо'
            };
            return dict[desc.toLowerCase()] || desc;
        }

        function getEmoji(icon) {
            if (!icon) return '🌍';
            const code = icon.slice(0, 2);
            const emojis = {
                '01': '☀️', '02': '⛅', '03': '☁️', '04': '☁️',
                '09': '🌧️', '10': '🌦️', '11': '⛈️', '13': '❄️', '50': '🌫️'
            };
            return emojis[code] || '🌈';
        }

        function updateUI(data) {
            cityName.textContent = data.name || 'Неизвестно';
            
            if (data.main) {
                temperature.textContent = Math.round(data.main.temp * 10) / 10;
                feelsLike.innerHTML = Math.round(data.main.feels_like * 10) / 10 + ' <small>°C</small>';
                humidity.innerHTML = data.main.humidity + ' <small>%</small>';
                pressure.innerHTML = data.main.pressure + ' <small>гПа</small>';
            }
            
            if (data.wind) {
                windSpeed.innerHTML = Math.round(data.wind.speed * 10) / 10 + ' <small>м/с</small>';
            }
            
            if (data.weather && data.weather[0]) {
                const w = data.weather[0];
                description.textContent = translateDesc(w.description);
                weatherIcon.textContent = getEmoji(w.icon);
            }
            
            errorMsg.classList.remove('show');
        }

        function showError(text) {
            errorMsg.textContent = '⚠️ ' + text;
            errorMsg.classList.add('show');
        }

        function clearWeather() {
            temperature.textContent = '--';
            feelsLike.innerHTML = '-- <small>°C</small>';
            humidity.innerHTML = '-- <small>%</small>';
            pressure.innerHTML = '-- <small>гПа</small>';
            windSpeed.innerHTML = '-- <small>м/с</small>';
            description.textContent = '—';
            weatherIcon.textContent = '🌍';
            cityName.textContent = 'Город';
        }

        function fetchWeather(lat, lon, cityNameFallback) {
            const url = `${BASE_URL}?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${API_KEY}`;
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('Ошибка ' + res.status);
                    return res.json();
                })
                .then(data => {
                    updateUI(data);
                    marker.setLatLng([lat, lon]);
                    marker.bindPopup(`
                        <b>${data.name}</b><br>
                        ${getEmoji(data.weather?.[0]?.icon)} ${translateDesc(data.weather?.[0]?.description || '')}<br>
                        🌡️ ${Math.round(data.main.temp * 10) / 10}°C
                    `);
                    marker.openPopup();
                    map.setView([lat, lon], 10);
                    if (cityNameFallback) cityInput.value = cityNameFallback;
                    else if (data.name) cityInput.value = data.name;
                })
                .catch(err => {
                    console.error(err);
                    showError('Не удалось получить погоду');
                });
        }

        function fetchByCity(city) {
            if (!city.trim()) {
                showError('Введите город');
                return;
            }
            const url = `${BASE_URL}?q=${encodeURIComponent(city.trim())}&units=metric&lang=ru&appid=${API_KEY}`;
            
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('Город не найден');
                    return res.json();
                })
                .then(data => {
                    if (data.coord) {
                        fetchWeather(data.coord.lat, data.coord.lon, data.name);
                    }
                })
                .catch(err => {
                    showError('Город не найден');
                    clearWeather();
                });
        }

        // События
        map.on('click', function(e) {
            fetchWeather(e.latlng.lat, e.latlng.lng);
        });

        searchBtn.addEventListener('click', function() {
            fetchByCity(cityInput.value);
        });

        cityInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                fetchByCity(cityInput.value);
            }
        });

        // Загрузка
        setTimeout(function() {
            fetchByCity('Москва');
        }, 500);
    })();
</script>
</body>
</html>
