<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ряженка 🌤️ (Минимальная версия)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0b1a2b;
            color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        input, button {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
        }
        input {
            background: rgba(255,255,255,0.1);
            color: #fff;
            width: 70%;
        }
        button {
            background: #f5c542;
            color: #1e2f3b;
            font-weight: bold;
            cursor: pointer;
        }
        .weather-icon { font-size: 64px; margin: 20px 0; }
        .temp { font-size: 48px; font-weight: 300; }
        .error { color: #ff7a7a; margin-top: 10px; }
        .footer { margin-top: 20px; opacity: 0.4; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ряженка 🌤️</h1>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <input type="text" id="cityInput" placeholder="Город" value="Moscow">
        <button id="searchBtn">Найти</button>
    </div>

    <div id="weatherDisplay" style="margin-top: 30px;">
        <div class="weather-icon" id="weatherIcon">🌍</div>
        <div class="temp" id="temperature">--</div>
        <div style="font-size: 20px; opacity: 0.8;" id="description">—</div>
        <div style="font-size: 14px; opacity: 0.5; margin-top: 10px;" id="cityName">Москва</div>
    </div>

    <div id="errorMsg" class="error" style="display: none;">⚠️ Ошибка</div>
    <div class="footer">Данные от OpenWeatherMap</div>
</div>

<script>
    (function() {
        "use strict";

        const API_KEY = '980ea6c12983c9ea25ad6919168044c0';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const cityNameEl = document.getElementById('cityName');
        const temperatureEl = document.getElementById('temperature');
        const descriptionEl = document.getElementById('description');
        const weatherIconEl = document.getElementById('weatherIcon');
        const errorMsgEl = document.getElementById('errorMsg');

        function fetchWeather(city) {
            if (!city || city.trim() === '') {
                showError('Введите город');
                return;
            }

            const trimmedCity = city.trim();
            const url = `${BASE_URL}?q=${encodeURIComponent(trimmedCity)}&units=metric&lang=ru&appid=${API_KEY}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 404) throw new Error('Город не найден');
                        if (response.status === 401) throw new Error('Ошибка API: проверьте ключ');
                        throw new Error(`Ошибка ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    updateUI(data);
                    hideError();
                })
                .catch(err => {
                    showError(err.message || 'Не удалось загрузить погоду');
                    console.warn(err);
                });
        }

        function updateUI(data) {
            const city = data.name || 'Неизвестно';
            cityNameEl.textContent = city;

            const temp = data.main?.temp;
            if (temp !== undefined) {
                temperatureEl.textContent = Math.round(temp * 10) / 10 + ' °C';
            }

            const weatherArr = data.weather;
            if (weatherArr && weatherArr.length > 0) {
                const w = weatherArr[0];
                descriptionEl.textContent = capitalizeFirst(translateDescription(w.description)) || '—';
                weatherIconEl.textContent = getWeatherEmoji(w.icon);
            } else {
                descriptionEl.textContent = '—';
                weatherIconEl.textContent = '🌍';
            }
        }

        function showError(msg) {
            errorMsgEl.textContent = '⚠️ ' + msg;
            errorMsgEl.style.display = 'block';
        }

        function hideError() {
            errorMsgEl.style.display = 'none';
        }

        function capitalizeFirst(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function translateDescription(desc) {
            const map = {
                'clear sky': 'ясно', 'few clouds': 'малооблачно',
                'scattered clouds': 'переменная облачность', 'broken clouds': 'облачно',
                'overcast clouds': 'пасмурно', 'shower rain': 'ливень',
                'rain': 'дождь', 'thunderstorm': 'гроза', 'snow': 'снег',
                'mist': 'туман', 'smoke': 'дымка', 'haze': 'мгла',
                'dust': 'пыль', 'fog': 'туман', 'sand': 'песчаная буря',
                'ash': 'пепел', 'squall': 'шквал', 'tornado': 'торнадо'
            };
            return map[desc.toLowerCase()] || desc;
        }

        function getWeatherEmoji(iconCode) {
            if (!iconCode) return '🌍';
            const code = iconCode.slice(0, 2);
            const map = {
                '01': '☀️', '02': '⛅', '03': '☁️', '04': '☁️',
                '09': '🌧️', '10': '🌦️', '11': '⛈️', '13': '❄️', '50': '🌫️'
            };
            return map[code] || '🌈';
        }

        function handleSearch() {
            const city = cityInput.value.trim();
            if (city) fetchWeather(city);
            else showError('Введите название города');
        }

        searchBtn.addEventListener('click', handleSearch);
        cityInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSearch();
            }
        });

        // Запуск при загрузке
        setTimeout(() => {
            const defaultCity = cityInput.value.trim() || 'Moscow';
            fetchWeather(defaultCity);
        }, 300);
    })();
</script>
</body>
</html>
