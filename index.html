<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ряженка 🌤️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body {
            min-height:100vh;
            background:linear-gradient(145deg,#0b1a2b,#1b3b4f);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1.5rem;
        }
        .container { max-width:820px; width:100%; display:flex; flex-direction:column; gap:20px; }
        .weather-card {
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(16px);
            border-radius:3.5rem;
            padding:2rem;
            border:1px solid rgba(255,255,255,0.15);
            color:#f0f8ff;
            box-shadow:0 30px 50px rgba(0,0,0,0.6);
        }
        .search-box { display:flex; gap:0.6rem; margin-bottom:1rem; flex-wrap:wrap; }
        .search-box input {
            flex:1; padding:0.9rem 1.4rem; border-radius:40px; border:none;
            background:rgba(255,255,255,0.2); color:#fff; font-size:1.1rem;
        }
        .search-box input::placeholder { color:#d3e4f0; opacity:0.8; }
        .search-box button {
            padding:0 1.8rem; border-radius:40px; border:none;
            background:#f5c542; color:#1e2f3b; font-weight:600; font-size:1.1rem;
            cursor:pointer; box-shadow:0 4px 12px rgba(245,197,66,0.3);
        }
        .search-box button:hover { background:#ffd966; transform:scale(1.02); }
        .search-box .gps-btn {
            background:#4CAF50; padding:0.9rem 1.2rem; font-size:1.4rem;
        }
        .search-box .gps-btn:hover { background:#66bb6a; }
        .city-name { font-size:2.6rem; font-weight:600; margin-bottom:0.2rem; }
        .weather-main { display:flex; align-items:center; justify-content:space-between; margin:0.5rem 0 0.8rem; }
        .temp-block { display:flex; align-items:baseline; gap:0.25rem; }
        .temp { font-size:4.8rem; font-weight:300; line-height:1; }
        .temp-unit { font-size:2rem; font-weight:300; opacity:0.7; }
        .weather-icon { font-size:4.2rem; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3)); cursor:pointer; }
        .description { font-size:1.3rem; font-weight:400; margin-bottom:1.6rem; border-left:3px solid #f5c542; padding-left:0.9rem; }
        .details-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:0.9rem 1.8rem;
            background:rgba(0,0,0,0.2); border-radius:2.5rem; padding:1.5rem 1.8rem;
        }
        .detail-item { display:flex; flex-direction:column; }
        .detail-label { font-size:0.8rem; text-transform:uppercase; opacity:0.6; }
        .detail-value { font-size:1.4rem; font-weight:500; margin-top:2px; }
        .detail-value small { font-size:0.8rem; opacity:0.7; margin-left:4px; }
        .error-msg {
            background:rgba(220,50,50,0.25); padding:0.8rem 1.2rem; border-radius:40px;
            margin-top:0.5rem; border-left:4px solid #ff7a7a; display:none;
        }
        .error-msg.show { display:block; }
        .footer-note { margin-top:1.5rem; font-size:0.75rem; text-align:center; opacity:0.4; }
        .dev-link {
            display:inline-flex; align-items:center; justify-content:center; gap:10px;
            background:rgba(255,255,255,0.06); padding:0.7rem 1.4rem; border-radius:50px;
            color:#f0f8ff; text-decoration:none; font-size:0.9rem;
            border:1px solid rgba(255,255,255,0.05); margin-top:1rem; width:100%;
        }
        .dev-link:hover { background:rgba(245,197,66,0.12); border-color:#f5c542; }
        .dev-link span { font-size:1.5rem; }
        #map { height:350px; border-radius:20px; margin-top:1rem; border:1px solid rgba(255,255,255,0.1); }
        .leaflet-control-attribution .leaflet-attribution-flag { display:none !important; }
        .leaflet-control-attribution { font-size:0.7rem; background:rgba(0,0,0,0.3); color:#ccc; padding:2px 8px !important; border-radius:12px; }
        .leaflet-control-attribution a { color:#8ab4d6 !important; }
        .forecast-title { font-size:1.3rem; font-weight:600; margin-bottom:1rem; }
        .forecast-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(100px,1fr)); gap:12px; margin-top:8px; }
        .forecast-item { background:rgba(255,255,255,0.06); border-radius:16px; padding:14px 10px; text-align:center; }
        .forecast-item .day { font-size:0.8rem; opacity:0.6; margin-bottom:4px; }
        .forecast-item .icon { font-size:2rem; }
        .forecast-item .temp { font-size:1.2rem; font-weight:600; display:block; }
        .forecast-item .desc { font-size:0.65rem; opacity:0.7; margin-top:4px; }
        .hourly-title { font-size:1.1rem; font-weight:600; margin:1.5rem 0 0.8rem; }
        .hourly-scroll { display:flex; gap:12px; overflow-x:auto; padding:8px 4px 12px; }
        .hourly-scroll::-webkit-scrollbar { height:4px; }
        .hourly-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:10px; }
        .hourly-item { flex:0 0 80px; background:rgba(255,255,255,0.06); border-radius:16px; padding:12px 8px; text-align:center; min-width:70px; }
        .hourly-item .time { font-size:0.7rem; opacity:0.5; margin-bottom:4px; }
        .hourly-item .icon { font-size:1.5rem; }
        .hourly-item .temp { font-size:1rem; font-weight:600; display:block; margin-top:2px; }
        @media (max-width:460px) {
            .weather-card { padding:1.5rem; }
            .temp { font-size:3.6rem; }
            .city-name { font-size:2rem; }
            .details-grid { grid-template-columns:1fr; gap:0.6rem; }
            #map { height:250px; }
            .forecast-grid { grid-template-columns:repeat(auto-fit, minmax(80px,1fr)); gap:8px; }
            .hourly-item { flex:0 0 65px; min-width:60px; padding:10px 6px; }
            .hourly-item .temp { font-size:0.85rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="weather-card">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Введите город" value="Moscow">
            <button id="searchBtn">Найти</button>
            <button id="gpsBtn" class="gps-btn">📍</button>
        </div>
        <div class="city-name" id="cityName">Москва</div>
        <div class="weather-main">
            <div class="temp-block">
                <span class="temp" id="temperature">--</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="weather-icon" id="weatherIcon">🌍</div>
        </div>
        <div class="description" id="description">—</div>
        <div class="details-grid">
            <div class="detail-item"><span class="detail-label">💧 Влажность</span><span class="detail-value" id="humidity">-- <small>%</small></span></div>
            <div class="detail-item"><span class="detail-label">💨 Ветер</span><span class="detail-value" id="windSpeed">-- <small>м/с</small></span></div>
            <div class="detail-item"><span class="detail-label">🌡️ Ощущается</span><span class="detail-value" id="feelsLike">-- <small>°C</small></span></div>
            <div class="detail-item"><span class="detail-label">📊 Давление</span><span class="detail-value" id="pressure">-- <small>гПа</small></span></div>
        </div>
        <div id="map"></div>
        <div class="error-msg" id="errorMsg">⚠️ Город не найден</div>
        <a href="https://goo.su/5AW3G" target="_blank" class="dev-link"><span>🐗</span> Другой сайт</a>
        <div class="footer-note">Данные от OpenWeatherMap • Карта OpenStreetMap</div>
    </div>

    <div class="weather-card">
        <div class="forecast-title">📅 Прогноз на 5 дней</div>
        <div class="forecast-grid" id="forecastGrid"><div style="text-align:center; opacity:0.5; padding:20px 0;">⏳ Загрузка...</div></div>
        <div class="hourly-title">🕒 Почасовой прогноз</div>
        <div class="hourly-scroll" id="hourlyGrid"><div style="text-align:center; opacity:0.5; padding:20px 0; width:100%;">⏳ Загрузка...</div></div>
        <div class="footer-note" style="margin-top:1rem;">Прогноз от OpenWeatherMap</div>
        <div style="text-align:center; margin-top:1.5rem; padding-top:0.5rem; border-top:1px solid rgba(255,255,255,0.05); font-size:0.8rem; opacity:0.5;">
            📧 <a href="mailto:maxikgrinevitch@yandex.ru" style="color:#f5c542; text-decoration:none;">maxikgrinevitch@yandex.ru</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    "use strict";

    // ===== КЛЮЧ (ВСТАВЬ СВОЙ) =====
    const API_KEY = '980ea6c12983c9ea25ad6919168044c0';
    const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';
    const FORECAST_URL = 'https://api.openweathermap.org/data/2.5/forecast';
    const PROXY = 'https://corsproxy.io/?';
    let useProxy = false;

    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const gpsBtn = document.getElementById('gpsBtn');
    const cityName = document.getElementById('cityName');
    const temperature = document.getElementById('temperature');
    const weatherIcon = document.getElementById('weatherIcon');
    const description = document.getElementById('description');
    const humidity = document.getElementById('humidity');
    const windSpeed = document.getElementById('windSpeed');
    const feelsLike = document.getElementById('feelsLike');
    const pressure = document.getElementById('pressure');
    const errorMsg = document.getElementById('errorMsg');
    const forecastGrid = document.getElementById('forecastGrid');
    const hourlyGrid = document.getElementById('hourlyGrid');

    // ===== КАРТА =====
    let map, marker;
    function initMap() {
        if (map) return;
        map = L.map('map').setView([55.7558, 37.6173], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        map.on('click', function(e) {
            setMarker(e.latlng.lat, e.latlng.lng, '📍 ' + e.latlng.lat.toFixed(4) + ', ' + e.latlng.lng.toFixed(4));
            fetchWeatherByCoords(e.latlng.lat, e.latlng.lng);
        });
        setMarker(55.7558, 37.6173, '📍 Москва');
    }

    function setMarker(lat, lon, text) {
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map);
        marker.bindPopup(text).openPopup();
        map.setView([lat, lon], 12);
    }

    // ===== ЗАПРОСЫ =====
    function fetchWithProxy(url) {
        return useProxy ? fetch(PROXY + url) : fetch(url);
    }

    function fetchWeatherByCoords(lat, lon) {
        fetchWithProxy(`${BASE_URL}?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${API_KEY}`)
            .then(r => r.json())
            .then(data => { updateUI(data); return fetchWithProxy(`${FORECAST_URL}?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${API_KEY}`); })
            .then(r => r.json())
            .then(data => updateForecast(data))
            .catch(() => showError('Ошибка загрузки'));
    }

    function fetchWeather(city) {
        if (!city.trim()) return showError('Введите город');
        fetchWithProxy(`${BASE_URL}?q=${encodeURIComponent(city.trim())}&units=metric&lang=ru&appid=${API_KEY}`)
            .then(r => r.json())
            .then(data => {
                updateUI(data);
                if (data.coord) {
                    setMarker(data.coord.lat, data.coord.lon, '📍 ' + data.name);
                    return fetchWithProxy(`${FORECAST_URL}?q=${encodeURIComponent(city.trim())}&units=metric&lang=ru&appid=${API_KEY}`);
                }
            })
            .then(r => r && r.json())
            .then(data => { if (data) updateForecast(data); })
            .catch(() => showError('Город не найден'));
    }

    // ===== UI =====
    function updateUI(data) {
        cityName.textContent = data.name || 'Неизвестно';
        temperature.textContent = data.main?.temp !== undefined ? Math.round(data.main.temp * 10) / 10 : '--';
        feelsLike.innerHTML = (data.main?.feels_like !== undefined ? Math.round(data.main.feels_like * 10) / 10 : '--') + ' <small>°C</small>';
        humidity.innerHTML = (data.main?.humidity || '--') + ' <small>%</small>';
        pressure.innerHTML = (data.main?.pressure || '--') + ' <small>гПа</small>';
        windSpeed.innerHTML = (data.wind?.speed !== undefined ? Math.round(data.wind.speed * 10) / 10 : '--') + ' <small>м/с</small>';
        if (data.weather && data.weather[0]) {
            description.textContent = translateDescription(data.weather[0].description) || '—';
            weatherIcon.textContent = getWeatherEmoji(data.weather[0].icon);
        }
        errorMsg.classList.remove('show');
    }

    function updateForecast(data) {
        if (!data.list) return;
        const daily = data.list.filter((_, i) => i % 8 === 0).slice(0, 5);
        forecastGrid.innerHTML = daily.map(item => `
            <div class="forecast-item">
                <div class="day">${formatDate(item.dt)}</div>
                <div class="icon">${getWeatherEmoji(item.weather[0].icon)}</div>
                <span class="temp">${Math.round(item.main.temp * 10) / 10}°C</span>
                <div class="desc">${translateDescription(item.weather[0].description)}</div>
            </div>
        `).join('');
        hourlyGrid.innerHTML = data.list.slice(0, 8).map(item => `
            <div class="hourly-item">
                <div class="time">${formatTime(item.dt)}</div>
                <div class="icon">${getWeatherEmoji(item.weather[0].icon)}</div>
                <span class="temp">${Math.round(item.main.temp * 10) / 10}°C</span>
            </div>
        `).join('');
    }

    // ===== ВСПОМОГАТЕЛЬНЫЕ =====
    function translateDescription(desc) {
        const map = {
            'clear sky':'ясно', 'few clouds':'малооблачно', 'scattered clouds':'переменная облачность',
            'broken clouds':'облачно', 'overcast clouds':'пасмурно', 'shower rain':'ливень',
            'rain':'дождь', 'thunderstorm':'гроза', 'snow':'снег',
            'mist':'туман', 'smoke':'дымка', 'haze':'мгла', 'dust':'пыль', 'fog':'туман',
            'sand':'песчаная буря', 'ash':'пепел', 'squall':'шквал', 'tornado':'торнадо'
        };
        return map[desc.toLowerCase()] || desc;
    }

    function getWeatherEmoji(iconCode) {
        if (!iconCode) return '🌍';
        const code = iconCode.slice(0, 2);
        if (code === '01') {
            const hours = new Date().getHours();
            return (hours >= 20 || hours < 6) ? '🌙' : '☀️';
        }
        const map = { '02':'⛅', '03':'☁️', '04':'☁️', '09':'🌧️', '10':'🌦️', '11':'⛈️', '13':'❄️', '50':'🌫️' };
        return map[code] || '🌈';
    }

    function formatDate(dt) { return new Date(dt*1000).toLocaleDateString('ru-RU', { weekday:'short', day:'numeric' }); }
    function formatTime(dt) { return new Date(dt*1000).toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }); }
    function showError(msg) { errorMsg.textContent = '⚠️ ' + msg; errorMsg.classList.add('show'); }

    // ===== СОБЫТИЯ =====
    searchBtn.addEventListener('click', () => fetchWeather(cityInput.value));
    cityInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); fetchWeather(cityInput.value); } });

    gpsBtn.addEventListener('click', function() {
        if (!navigator.geolocation) return showError('Геолокация не поддерживается');
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude;
                setMarker(lat, lon, '📍 Вы здесь');
                fetchWeatherByCoords(lat, lon);
            },
            () => showError('Не удалось определить местоположение'),
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });

    // ===== ЗАПУСК =====
    window.addEventListener('load', () => setTimeout(initMap, 300));
    setTimeout(() => fetchWeather(cityInput.value.trim() || 'Moscow'), 100);

    // ===== ЗЕМЛЕТРЯСЕНИЕ =====
    (function() {
        let taps = 0, quake = false;
        const icon = document.getElementById('weatherIcon');
        if (!icon) return;
        icon.addEventListener('mouseenter', () => { if (++taps >= 5) { triggerQuake(); taps = 0; } });
        icon.addEventListener('click', () => { if (++taps >= 10) { triggerQuake(); taps = 0; } });
        setInterval(() => taps = 0, 10000);

        function triggerQuake() {
            if (quake) return;
            quake = true;
            const emojis = ['🪱','🪏','🌿'];
            for (let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
                el.style.cssText = `position:fixed; left:${Math.random()*100}%; top:-10%; font-size:${Math.random()*2+1}rem; pointer-events:none; z-index:9999; transition:transform 2s ease-in;`;
                document.body.appendChild(el);
                requestAnimationFrame(() => el.style.transform = `translateY(${window.innerHeight+100}px) rotate(${Math.random()*360}deg)`);
                setTimeout(() => el.remove(), 2500);
            }
            setTimeout(() => quake = false, 3000);
        }
    })();
})();
</script>
</body>
</html>
