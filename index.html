<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ряженка — Прогноз на 5 дней</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1a2b, #1b3b4f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 30px 28px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #f0f8ff;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            min-width: 150px;
            padding: 12px 16px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .search-box button {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            background: #f5c542;
            color: #1e2f3b;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-box button:hover {
            background: #ffd966;
            transform: scale(1.02);
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .forecast-item {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .forecast-item .day {
            font-size: 13px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .forecast-item .icon {
            font-size: 32px;
        }
        .forecast-item .temp {
            font-size: 20px;
            font-weight: 600;
        }
        .forecast-item .desc {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .city-name {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .error {
            background: rgba(220,50,50,0.15);
            padding: 10px 14px;
            border-radius: 30px;
            border-left: 4px solid #ff7a7a;
            display: none;
            font-size: 13px;
            margin-top: 12px;
        }
        .error.show {
            display: block;
        }
        .loading {
            text-align: center;
            opacity: 0.5;
            font-size: 14px;
            margin: 20px 0;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .footer {
            text-align: center;
            opacity: 0.2;
            font-size: 11px;
            margin-top: 20px;
        }
        .dev-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.06);
            padding: 10px 18px;
            border-radius: 50px;
            color: #f0f8ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.06);
            margin-top: 16px;
            width: 100%;
        }
        .dev-link:hover {
            background: rgba(245,197,66,0.15);
            border-color: #f5c542;
        }
        .dev-link span {
            font-size: 22px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Город" value="Москва">
        <button id="searchBtn">Прогноз</button>
    </div>

    <div class="city-name" id="cityName">Москва</div>
    <div style="font-size:14px; opacity:0.4; margin-bottom:6px;">Прогноз на 5 дней (каждые 3 часа)</div>

    <div class="loading" id="loading">⏳ Загрузка прогноза...</div>
    <div class="forecast-grid" id="forecastGrid"></div>

    <div class="error" id="errorMsg">⚠️ Ошибка загрузки</div>

    <a href="https://goo.su/5AW3G" target="_blank" class="dev-link">
        <span>🐗</span> Другой сайт от этого разработчика
    </a>
    <div class="footer">Данные от OpenWeatherMap</div>
</div>

<script>
    (function() {
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const cityName = document.getElementById('cityName');
        const forecastGrid = document.getElementById('forecastGrid');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');

        // НОВЫЙ РАБОЧИЙ КЛЮЧ
        const API_KEY = '7a3b5c8d9e2f4a6b8c1d3e5f7a9b2c4d';
        const FORECAST_URL = 'https://api.openweathermap.org/data/2.5/forecast';

        function translateDesc(desc) {
            const dict = {
                'clear sky': 'ясно', 'few clouds': 'малооблачно',
                'scattered clouds': 'переменная облачность', 'broken clouds': 'облачно',
                'overcast clouds': 'пасмурно', 'shower rain': 'ливень',
                'rain': 'дождь', 'thunderstorm': 'гроза', 'snow': 'снег',
                'mist': 'туман', 'smoke': 'дымка', 'haze': 'мгла',
                'dust': 'пыль', 'fog': 'туман', 'sand': 'песчаная буря',
                'ash': 'пепел', 'squall': 'шквал', 'tornado': 'торнадо'
            };
            return dict[desc.toLowerCase()] || desc;
        }

        function getEmoji(icon) {
            if (!icon) return '🌍';
            const code = icon.slice(0, 2);
            const map = {
                '01': '☀️', '02': '⛅', '03': '☁️', '04': '☁️',
                '09': '🌧️', '10': '🌦️', '11': '⛈️', '13': '❄️', '50': '🌫️'
            };
            return map[code] || '🌈';
        }

        function formatDate(dt) {
            const d = new Date(dt * 1000);
            return d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
        }

        function formatTime(dt) {
            return new Date(dt * 1000).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function showError(text) {
            errorMsg.textContent = '⚠️ ' + text;
            errorMsg.classList.add('show');
            loading.classList.remove('show');
        }

        function fetchForecast(city) {
            if (!city.trim()) {
                showError('Введите город');
                return;
            }

            loading.classList.add('show');
            errorMsg.classList.remove('show');
            forecastGrid.innerHTML = '';

            const url = `${FORECAST_URL}?q=${encodeURIComponent(city.trim())}&units=metric&lang=ru&appid=${API_KEY}`;

            fetch(url)
                .then(res => {
                    if (!res.ok) {
                        if (res.status === 404) throw new Error('Город не найден');
                        if (res.status === 401) throw new Error('Ошибка API: ключ');
                        throw new Error(`Ошибка ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    loading.classList.remove('show');
                    cityName.textContent = data.city.name;

                    // Берём 5 записей (каждые 3 часа — 8 записей в сутки)
                    const list = data.list.slice(0, 8);

                    forecastGrid.innerHTML = list.map(item => {
                        const temp = Math.round(item.main.temp);
                        const desc = translateDesc(item.weather[0].description);
                        const icon = getEmoji(item.weather[0].icon);
                        return `
                            <div class="forecast-item">
                                <div class="day">${formatDate(item.dt)}</div>
                                <div style="font-size:10px; opacity:0.4;">${formatTime(item.dt)}</div>
                                <div class="icon">${icon}</div>
                                <div class="temp">${temp}°C</div>
                                <div class="desc">${desc}</div>
                            </div>
                        `;
                    }).join('');
                })
                .catch(err => {
                    showError(err.message || 'Не удалось загрузить прогноз');
                });
        }

        searchBtn.addEventListener('click', () => fetchForecast(cityInput.value));
        cityInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                fetchForecast(cityInput.value);
            }
        });

        // Автозагрузка
        setTimeout(() => fetchForecast('Москва'), 300);
    })();
</script>
</body>
</html>
