<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ряженка 🌤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1a2b, #1b3b4f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .weather-card {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 30px 28px 35px;
            border: 1px solid rgba(255,255,255,0.12);
            color: #f0f8ff;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            min-width: 150px;
            padding: 12px 16px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .search-box input:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 0 3px rgba(245,197,66,0.2);
        }
        .search-box button {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: #f5c542;
            color: #1e2f3b;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(245,197,66,0.25);
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #ffd966;
            transform: scale(1.03);
        }
        .search-box .gps-btn {
            background: #4CAF50;
            box-shadow: 0 4px 15px rgba(76,175,80,0.25);
            padding: 12px 14px;
            font-size: 18px;
        }
        .search-box .gps-btn:hover {
            background: #66bb6a;
        }
        .search-hint {
            font-size: 11px;
            opacity: 0.3;
            margin-bottom: 18px;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .city-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 2px;
        }
        .temp {
            font-size: 56px;
            font-weight: 300;
            line-height: 1;
        }
        .temp-unit {
            font-size: 24px;
            opacity: 0.6;
        }
        .weather-icon {
            font-size: 48px;
        }
        .description {
            font-size: 18px;
            padding-left: 14px;
            border-left: 4px solid #f5c542;
            margin: 8px 0 20px;
            opacity: 0.9;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.4;
            letter-spacing: 0.8px;
        }
        .detail-value {
            font-size: 18px;
            font-weight: 500;
            margin-top: 2px;
        }
        .detail-value small {
            font-size: 12px;
            opacity: 0.6;
            margin-left: 3px;
        }
        .coord-display {
            font-size: 11px;
            opacity: 0.25;
            text-align: center;
            font-family: monospace;
            margin-bottom: 14px;
        }
        .error {
            background: rgba(220,50,50,0.15);
            padding: 10px 14px;
            border-radius: 30px;
            border-left: 4px solid #ff7a7a;
            display: none;
            font-size: 13px;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .error.show {
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            opacity: 0.5;
            font-size: 13px;
            margin: 8px 0;
        }
        .loading.show {
            display: block;
        }
        .footer {
            text-align: center;
            opacity: 0.15;
            font-size: 10px;
            margin-top: 14px;
            letter-spacing: 0.5px;
        }
        .dev-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
            padding: 10px 18px;
            border-radius: 50px;
            color: #f0f8ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.06);
            margin-top: 6px;
            width: 100%;
            text-align: center;
            justify-content: center;
        }
        .dev-link:hover {
            background: rgba(245,197,66,0.15);
            border-color: #f5c542;
            transform: scale(1.02);
        }
        .dev-link span {
            font-size: 22px;
        }
        @media (max-width: 480px) {
            .weather-card { padding: 20px 16px; }
            .temp { font-size: 42px; }
            .city-name { font-size: 22px; }
            .weather-icon { font-size: 36px; }
            .search-box input { min-width: 100px; font-size: 13px; padding: 10px 12px; }
            .search-box button { padding: 10px 14px; font-size: 13px; }
            .details { grid-template-columns: 1fr; gap: 6px; }
            .dev-link { font-size: 12px; padding: 8px 14px; }
        }
    </style>
</head>
<body>
<div class="weather-card">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Город или координаты" value="Москва">
        <button id="searchBtn">Найти</button>
        <button id="gpsBtn" class="gps-btn" title="Моё местоположение">📍</button>
    </div>
    <div class="search-hint">Введите город или широту, долготу</div>

    <div class="city-name" id="cityName">Москва</div>

    <div class="weather-main">
        <div>
            <span class="temp" id="temperature">--</span>
            <span class="temp-unit">°C</span>
        </div>
        <div class="weather-icon" id="weatherIcon">🌍</div>
    </div>

    <div class="description" id="description">—</div>

    <div class="details">
        <div class="detail-item">
            <span class="detail-label">💧 Влажность</span>
            <span class="detail-value" id="humidity">-- <small>%</small></span>
        </div>
        <div class="detail-item">
            <span class="detail-label">💨 Ветер</span>
            <span class="detail-value" id="windSpeed">-- <small>м/с</small></span>
        </div>
        <div class="detail-item">
            <span class="detail-label">🌡️ Ощущается</span>
            <span class="detail-value" id="feelsLike">-- <small>°C</small></span>
        </div>
        <div class="detail-item">
            <span class="detail-label">📊 Давление</span>
            <span class="detail-value" id="pressure">-- <small>гПа</small></span>
        </div>
    </div>

    <div class="coord-display" id="coordDisplay">📍 55.7558, 37.6173</div>
    <div class="loading" id="loading">⏳ Загрузка...</div>
    <div class="error" id="errorMsg">⚠️ Ошибка</div>

    <a href="https://goo.su/5AW3G" target="_blank" class="dev-link">
        <span>🐗</span> Другой сайт от этого разработчика
    </a>

    <div class="footer">Данные от wttr.in (без ключей)</div>
</div>

<script>
    (function() {
        "use strict";

        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const gpsBtn = document.getElementById('gpsBtn');
        const cityName = document.getElementById('cityName');
        const temperature = document.getElementById('temperature');
        const weatherIcon = document.getElementById('weatherIcon');
        const description = document.getElementById('description');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('windSpeed');
        const feelsLike = document.getElementById('feelsLike');
        const pressure = document.getElementById('pressure');
        const coordDisplay = document.getElementById('coordDisplay');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');

        // ИСПОЛЬЗУЕМ WTTR.IN — он 100% работает с GitHub Pages
        const WTTR_URL = 'https://wttr.in';

        function showError(text) {
            errorMsg.textContent = '⚠️ ' + text;
            errorMsg.classList.add('show');
            loading.classList.remove('show');
        }

        function hideError() {
            errorMsg.classList.remove('show');
        }

        function getEmoji(condition) {
            const map = {
                'clear': '☀️',
                'sunny': '☀️',
                'partly cloudy': '⛅',
                'cloudy': '☁️',
                'overcast': '☁️',
                'rain': '🌧️',
                'light rain': '🌦️',
                'heavy rain': '🌧️',
                'shower': '🌦️',
                'thunder': '⛈️',
                'snow': '❄️',
                'light snow': '🌨️',
                'heavy snow': '❄️',
                'mist': '🌫️',
                'fog': '🌫️',
                'haze': '🌫️'
            };
            const lower = condition.toLowerCase();
            for (const [key, emoji] of Object.entries(map)) {
                if (lower.includes(key)) return emoji;
            }
            return '🌍';
        }

        function updateUI(data, lat, lon) {
            if (data.current_condition && data.current_condition[0]) {
                const current = data.current_condition[0];
                
                const temp = current.temp_C;
                temperature.textContent = temp;

                const feels = current.FeelsLikeC || temp;
                feelsLike.innerHTML = feels + ' <small>°C</small>';

                humidity.innerHTML = current.humidity + ' <small>%</small>';

                const wind = current.windSpeedKmph;
                windSpeed.innerHTML = Math.round(wind / 3.6 * 10) / 10 + ' <small>м/с</small>';

                pressure.innerHTML = current.pressure + ' <small>гПа</small>';

                const desc = current.weatherDesc[0]?.value || '—';
                description.textContent = desc;

                const icon = getEmoji(desc);
                weatherIcon.textContent = icon;
            }

            if (data.nearest_area && data.nearest_area[0]) {
                const area = data.nearest_area[0];
                const name = area.areaName[0]?.value || 'Неизвестно';
                const country = area.country[0]?.value || '';
                cityName.textContent = name + (country ? ', ' + country : '');
            }

            if (lat && lon) {
                coordDisplay.textContent = `📍 ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            }

            hideError();
            loading.classList.remove('show');
        }

        function fetchWeather(query, isCoords = false) {
            loading.classList.add('show');
            hideError();

            let url;
            if (isCoords) {
                url = `${WTTR_URL}/${query}?format=j1&lang=ru`;
            } else {
                url = `${WTTR_URL}/${encodeURIComponent(query)}?format=j1&lang=ru`;
            }

            fetch(url, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'User-Agent': 'Mozilla/5.0'
                }
            })
            .then(res => {
                if (!res.ok) throw new Error('Ошибка ' + res.status);
                return res.json();
            })
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                updateUI(data);
            })
            .catch(err => {
                showError('Не удалось получить погоду: ' + err.message);
                loading.classList.remove('show');
            });
        }

        function parseCoordinates(input) {
            const parts = input.split(/[,;]\s*|\s+/).filter(p => p.trim());
            if (parts.length === 2) {
                const lat = parseFloat(parts[0]);
                const lon = parseFloat(parts[1]);
                if (!isNaN(lat) && !isNaN(lon) && 
                    lat >= -90 && lat <= 90 && 
                    lon >= -180 && lon <= 180) {
                    return { lat, lon };
                }
            }
            return null;
        }

        function fetchByCity(city) {
            if (!city.trim()) {
                showError('Введите город');
                return;
            }

            const trimmed = city.trim();
            const coords = parseCoordinates(trimmed);
            
            if (coords) {
                fetchWeather(`${coords.lat},${coords.lon}`, true);
                return;
            }

            fetchWeather(trimmed, false);
        }

        function getCurrentLocation() {
            if (!navigator.geolocation) {
                showError('Ваш браузер не поддерживает геолокацию');
                return;
            }

            loading.classList.add('show');
            hideError();

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    fetchWeather(`${lat},${lon}`, true);
                },
                function(error) {
                    loading.classList.remove('show');
                    let msg = 'Не удалось определить местоположение';
                    if (error.code === 1) msg = 'Доступ к геолокации запрещен';
                    else if (error.code === 2) msg = 'Сигнал GPS недоступен';
                    else if (error.code === 3) msg = 'Время ожидания истекло';
                    showError(msg);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 60000
                }
            );
        }

        searchBtn.addEventListener('click', function() {
            fetchByCity(cityInput.value);
        });

        cityInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                fetchByCity(cityInput.value);
            }
        });

        gpsBtn.addEventListener('click', getCurrentLocation);

        setTimeout(function() {
            fetchByCity('Москва');
        }, 300);
    })();
</script>
</body>
</html>
