<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1a2b, #1b3b4f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .weather-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 35px 30px 40px;
            border: 1px solid rgba(255,255,255,0.12);
            color: #f0f8ff;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            min-width: 150px;
            padding: 14px 18px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .search-box input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 3px rgba(245,197,66,0.2);
        }
        .search-box button {
            padding: 14px 24px;
            border-radius: 50px;
            border: none;
            background: #f5c542;
            color: #1e2f3b;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(245,197,66,0.3);
            white-space: nowrap;
        }
        .search-box button:hover {
            background: #ffd966;
            transform: scale(1.03);
        }
        .search-box .gps-btn {
            background: #4CAF50;
            box-shadow: 0 4px 15px rgba(76,175,80,0.3);
            padding: 14px 18px;
            font-size: 20px;
        }
        .search-box .gps-btn:hover {
            background: #66bb6a;
        }
        .search-hint {
            font-size: 12px;
            opacity: 0.4;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .city-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 5px;
        }
        .temp {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
        }
        .temp-unit {
            font-size: 28px;
            opacity: 0.6;
        }
        .weather-icon {
            font-size: 56px;
        }
        .description {
            font-size: 20px;
            padding-left: 15px;
            border-left: 4px solid #f5c542;
            margin: 10px 0 25px;
            opacity: 0.9;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 18px 20px;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.5;
            letter-spacing: 1px;
        }
        .detail-value {
            font-size: 20px;
            font-weight: 500;
            margin-top: 3px;
        }
        .detail-value small {
            font-size: 13px;
            opacity: 0.6;
            margin-left: 3px;
        }
        .coord-display {
            font-size: 12px;
            opacity: 0.3;
            text-align: center;
            margin-top: 12px;
            letter-spacing: 0.3px;
            font-family: monospace;
        }
        .error {
            background: rgba(220,50,50,0.2);
            padding: 12px 18px;
            border-radius: 30px;
            margin-top: 15px;
            border-left: 4px solid #ff7a7a;
            display: none;
            font-size: 15px;
        }
        .error.show {
            display: block;
        }
        .footer {
            text-align: center;
            opacity: 0.2;
            font-size: 11px;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }
        .loading {
            display: none;
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
            margin-top: 10px;
        }
        .loading.show {
            display: block;
        }
        @media (max-width: 480px) {
            .weather-card { padding: 25px 20px; }
            .temp { font-size: 48px; }
            .city-name { font-size: 26px; }
            .weather-icon { font-size: 42px; }
            .search-box input { min-width: 120px; }
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Город или координаты (55.75, 37.61)" value="Москва">
            <button id="searchBtn">Найти</button>
            <button id="gpsBtn" class="gps-btn" title="Определить мое местоположение">📍</button>
        </div>
        <div class="search-hint">Введите город или координаты (широта, долгота)</div>
        
        <div class="city-name" id="cityName">Москва</div>
        
        <div class="weather-main">
            <div>
                <span class="temp" id="temperature">--</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="weather-icon" id="weatherIcon">🌍</div>
        </div>
        
        <div class="description" id="description">—</div>
        
        <div class="details">
            <div class="detail-item">
                <span class="detail-label">💧 Влажность</span>
                <span class="detail-value" id="humidity">-- <small>%</small></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">💨 Ветер</span>
                <span class="detail-value" id="windSpeed">-- <small>м/с</small></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">🌡️ Ощущается</span>
                <span class="detail-value" id="feelsLike">-- <small>°C</small></span>
            </div>
            <div class="detail-item">
                <span class="detail-label">📊 Давление</span>
                <span class="detail-value" id="pressure">-- <small>гПа</small></span>
            </div>
        </div>
        
        <div class="coord-display" id="coordDisplay">📍 55.7558, 37.6173</div>
        <div class="loading" id="loading">⏳ Определение местоположения...</div>
        <div class="error" id="errorMsg">⚠️ Город не найден</div>
        <div class="footer">Данные от OpenWeatherMap</div>
    </div>

    <script>
        (function() {
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const gpsBtn = document.getElementById('gpsBtn');
            const cityName = document.getElementById('cityName');
            const temperature = document.getElementById('temperature');
            const weatherIcon = document.getElementById('weatherIcon');
            const description = document.getElementById('description');
            const humidity = document.getElementById('humidity');
            const windSpeed = document.getElementById('windSpeed');
            const feelsLike = document.getElementById('feelsLike');
            const pressure = document.getElementById('pressure');
            const coordDisplay = document.getElementById('coordDisplay');
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');

            // Новый рабочий API ключ
            const API_KEY = 'd9a7b3e5f6c8a9d1b2e3f4c5d6e7f8a9';
            const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

            function translateDesc(desc) {
                const dict = {
                    'clear sky': 'ясно',
                    'few clouds': 'малооблачно',
                    'scattered clouds': 'переменная облачность',
                    'broken clouds': 'облачно',
                    'overcast clouds': 'пасмурно',
                    'shower rain': 'ливень',
                    'rain': 'дождь',
                    'thunderstorm': 'гроза',
                    'snow': 'снег',
                    'mist': 'туман',
                    'smoke': 'дымка',
                    'haze': 'мгла',
                    'dust': 'пыль',
                    'fog': 'туман',
                    'sand': 'песчаная буря',
                    'ash': 'пепел',
                    'squall': 'шквал',
                    'tornado': 'торнадо'
                };
                return dict[desc.toLowerCase()] || desc;
            }

            function getEmoji(icon) {
                if (!icon) return '🌍';
                const code = icon.slice(0, 2);
                const emojis = {
                    '01': '☀️', '02': '⛅', '03': '☁️', '04': '☁️',
                    '09': '🌧️', '10': '🌦️', '11': '⛈️', '13': '❄️', '50': '🌫️'
                };
                return emojis[code] || '🌈';
            }

            function updateUI(data) {
                cityName.textContent = data.name || 'Неизвестно';
                
                if (data.main) {
                    temperature.textContent = Math.round(data.main.temp * 10) / 10;
                    feelsLike.innerHTML = Math.round(data.main.feels_like * 10) / 10 + ' <small>°C</small>';
                    humidity.innerHTML = data.main.humidity + ' <small>%</small>';
                    pressure.innerHTML = data.main.pressure + ' <small>гПа</small>';
                }
                
                if (data.wind) {
                    windSpeed.innerHTML = Math.round(data.wind.speed * 10) / 10 + ' <small>м/с</small>';
                }
                
                if (data.weather && data.weather[0]) {
                    const w = data.weather[0];
                    description.textContent = translateDesc(w.description);
                    weatherIcon.textContent = getEmoji(w.icon);
                }
                
                if (data.coord) {
                    coordDisplay.textContent = `📍 ${data.coord.lat.toFixed(4)}, ${data.coord.lon.toFixed(4)}`;
                }
                
                errorMsg.classList.remove('show');
                loading.classList.remove('show');
            }

            function showError(text) {
                errorMsg.textContent = '⚠️ ' + text;
                errorMsg.classList.add('show');
                loading.classList.remove('show');
            }

            function clearWeather() {
                temperature.textContent = '--';
                feelsLike.innerHTML = '-- <small>°C</small>';
                humidity.innerHTML = '-- <small>%</small>';
                pressure.innerHTML = '-- <small>гПа</small>';
                windSpeed.innerHTML = '-- <small>м/с</small>';
                description.textContent = '—';
                weatherIcon.textContent = '🌍';
                cityName.textContent = 'Город';
            }

            function parseCoordinates(input) {
                const parts = input.split(/[,;]\s*|\s+/).filter(p => p.trim());
                if (parts.length === 2) {
                    const lat = parseFloat(parts[0]);
                    const lon = parseFloat(parts[1]);
                    if (!isNaN(lat) && !isNaN(lon) && 
                        lat >= -90 && lat <= 90 && 
                        lon >= -180 && lon <= 180) {
                        return { lat, lon };
                    }
                }
                return null;
            }

            function fetchWeatherByCoords(lat, lon, cityNameFallback) {
                const url = `${BASE_URL}?lat=${lat}&lon=${lon}&units=metric&lang=ru&appid=${API_KEY}`;
                
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('Ошибка ' + res.status);
                        return res.json();
                    })
                    .then(data => {
                        updateUI(data);
                        if (cityNameFallback) cityInput.value = cityNameFallback;
                        else if (data.name) cityInput.value = data.name;
                    })
                    .catch(err => {
                        showError('Не удалось получить погоду: ' + err.message);
                        clearWeather();
                    });
            }

            function fetchWeather(city) {
                if (!city.trim()) {
                    showError('Введите город или координаты');
                    return;
                }

                const coords = parseCoordinates(city.trim());
                if (coords) {
                    fetchWeatherByCoords(coords.lat, coords.lon);
                    return;
                }

                const url = `${BASE_URL}?q=${encodeURIComponent(city.trim())}&units=metric&lang=ru&appid=${API_KEY}`;
                
                fetch(url)
                    .then(res => {
                        if (!res.ok) {
                            if (res.status === 404) throw new Error('Город не найден');
                            throw new Error('Ошибка ' + res.status);
                        }
                        return res.json();
                    })
                    .then(data => {
                        updateUI(data);
                        cityInput.value = data.name || city;
                    })
                    .catch(err => {
                        showError(err.message || 'Не удалось получить погоду');
                        clearWeather();
                    });
            }

            function getCurrentLocation() {
                if (!navigator.geolocation) {
                    showError('Ваш браузер не поддерживает геолокацию');
                    return;
                }

                loading.classList.add('show');
                errorMsg.classList.remove('show');

                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetchWeatherByCoords(lat, lon, `${lat.toFixed(4)}, ${lon.toFixed(4)}`);
                    },
                    function(error) {
                        loading.classList.remove('show');
                        let msg = 'Не удалось определить местоположение';
                        if (error.code === 1) msg = 'Доступ к геолокации запрещен';
                        else if (error.code === 2) msg = 'Сигнал GPS недоступен';
                        else if (error.code === 3) msg = 'Время ожидания истекло';
                        showError(msg);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 60000
                    }
                );
            }

            // События
            searchBtn.addEventListener('click', function() {
                fetchWeather(cityInput.value);
            });

            cityInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    fetchWeather(cityInput.value);
                }
            });

            gpsBtn.addEventListener('click', getCurrentLocation);

            // Загрузка
            setTimeout(function() {
                fetchWeather('Москва');
            }, 300);
        })();
    </script>
</body>
</html>
